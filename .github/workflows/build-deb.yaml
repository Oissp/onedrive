# .github/workflows/build-deb.yaml
name: Build Debian Package


on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container: debian:trixie
    defaults:
      run:
        shell: bash

    steps:
    - name: Install git
      run: apt-get update && apt-get install -y git

    - name: Checkout
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Fetch upstream tags
      run: |
        git config --global --add safe.directory /__w/onedrive/onedrive
        git remote add upstream https://github.com/abraunegg/onedrive.git
        git fetch upstream --tags

    - name: Get version from tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VER="${GITHUB_REF#refs/tags/v}"
        else
          # git describe gives e.g. v2.5.10-80-g47dc550; convert to 2.5.10+80+g47dc550
          # so dpkg sorts this ABOVE the upstream release and above any distro package
          DESC=$(git describe --tags --long 2>/dev/null || echo "0-0-g${GITHUB_SHA::7}")
          VER=$(echo "$DESC" | sed 's/^v//; s/-\([0-9]*\)-g/+\1+g/')
        fi
        echo "version=$VER" >> "$GITHUB_OUTPUT"

    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          libcurl4-openssl-dev \
          libsqlite3-dev \
          pkg-config \
          ldc \
          libdbus-1-dev

    - name: Configure & Build (static link phobos)
      run: |
        ./configure --prefix=/usr DC=ldc2 DCFLAGS="-link-defaultlib-shared=false"
        make clean
        make

    - name: Verify linking
      run: |
        if ldd ./onedrive | grep -q phobos; then
          echo "ERROR: phobos is dynamically linked"
          ldd ./onedrive
          exit 1
        fi
        echo "OK: phobos is statically linked"

    - name: Build .deb package
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PKG_DIR="onedrive-${VERSION}"
        DESTDIR="$PWD/$PKG_DIR"

        make install DESTDIR="$DESTDIR"

        mkdir -p "$PKG_DIR/DEBIAN"

        printf 'Package: onedrive\nVersion: %s\nSection: net\nPriority: optional\nArchitecture: amd64\nDepends: libcurl4t64, libsqlite3-0, libdbus-1-3\nMaintainer: ${{ github.repository_owner }} <${{ github.actor }}@users.noreply.github.com>\nDescription: OneDrive Client for Linux (Custom Build)\n  A free Microsoft OneDrive client for Linux.\n  Forked from https://github.com/abraunegg/onedrive\n' "$VERSION" > "$PKG_DIR/DEBIAN/control"

        dpkg-deb --build --root-owner-group "$PKG_DIR"

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v7
      with:
        name: onedrive-${{ steps.version.outputs.version }}-amd64
        path: "*.deb"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: "*.deb"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
