# .github/workflows/build-deb.yaml
name: Build Debian Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container: debian:trixie
    defaults:
      run:
        shell: bash

    steps:
    - name: Install git
      run: apt-get update && apt-get install -y git

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch upstream tags
      run: |
        git config --global --add safe.directory /__w/onedrive/onedrive
        git remote add upstream https://github.com/abraunegg/onedrive.git
        git fetch upstream --tags

    - name: Get version from tag
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VER="${GITHUB_REF#refs/tags/v}"
        else
          VER="0.0.0~dev-$(date +%Y%m%d)-${GITHUB_SHA::7}"
        fi
        echo "version=$VER" >> "$GITHUB_OUTPUT"

    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y \
          build-essential \
          libcurl4-openssl-dev \
          libsqlite3-dev \
          pkg-config \
          ldc \
          libdbus-1-dev \
          debhelper devscripts

    - name: Configure & Build (static link phobos)
      run: |
        ./configure --prefix=/usr
        make clean
        make "DC=ldc2 -link-defaultlib-shared=false"

    - name: Verify linking
      run: ldd ./onedrive | grep phobos || echo "OK: phobos is statically linked"

    - name: Build .deb package
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PKG_DIR="onedrive-${VERSION}"
        DESTDIR="$PWD/$PKG_DIR"

        make install DESTDIR="$DESTDIR"

        mkdir -p "$PKG_DIR/DEBIAN"

        printf 'Package: onedrive\nVersion: %s\nSection: net\nPriority: optional\nArchitecture: amd64\nDepends: libcurl4t64, libsqlite3-0, libdbus-1-3\nMaintainer: Your Name <your@email.com>\nDescription: OneDrive Client for Linux (Custom Build)\n  A free Microsoft OneDrive client for Linux.\n  Forked from https://github.com/abraunegg/onedrive\n' "$VERSION" > "$PKG_DIR/DEBIAN/control"

        dpkg-deb --build --root-owner-group "$PKG_DIR"

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: onedrive-${{ steps.version.outputs.version }}-amd64
        path: "*.deb"

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: "*.deb"
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
